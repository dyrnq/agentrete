name: CI

on:
  push:
    branches: [main]
    tags-ignore: ["v*"]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  lint:
    name: Lint & fmt
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: lint-cargo-${{ hashFiles('Cargo.lock') }}
      - name: Check formatting
        run: cargo fmt --all -- --check
      - name: Download ext artifact
        uses: actions/download-artifact@v4
        with:
          name: sqlite-vec-ext
          path: ext
      - name: Clippy
        run: cargo clippy --all-targets

  test:
    needs: [prep, lint]
    name: Test
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: test-cargo-${{ hashFiles('Cargo.lock') }}
      - name: Download ext artifact
        uses: actions/download-artifact@v4
        with:
          name: sqlite-vec-ext
          path: ext
      - name: Build
        run: cargo build
      - name: Build release
        run: cargo build --release
      - name: Run tests
        run: cargo test
