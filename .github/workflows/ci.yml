name: CI

on:
  push:
    branches: [main]
    tags-ignore: ["v*"]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  lint:
    name: Lint & fmt
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: lint-cargo-${{ hashFiles('Cargo.lock') }}
      - name: Check formatting
        run: cargo fmt --all -- --check
      - name: Clippy
        run: cargo clippy --all-targets

  cross-check:
    needs: [lint]
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
          - os: macos-14
            target: aarch64-apple-darwin
          - os: macos-14
            target: x86_64-apple-darwin
          - os: windows-2022
            target: x86_64-pc-windows-msvc
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cross-${{ matrix.target }}-cargo-${{ hashFiles('Cargo.lock') }}
      - name: Install NASM (Windows only)
        if: runner.os == 'Windows'
        uses: ilammy/setup-nasm@v1
      - name: Build (debug)
        run: cargo build --target ${{ matrix.target }}
      - name: Smoke test (Linux)
        if: runner.os == 'Linux'
        run: |
          mkdir -p /tmp/smoke
          cat > /tmp/smoke/config.toml << 'TOML'
          port = 19099
          db_dir = "/tmp/smoke"

          [embedding]
          backend = "none"

          [knowledge_graph]
          enabled = false
          TOML

          ./target/${{ matrix.target }}/debug/agentrete -c /tmp/smoke/config.toml mcp --port 19099 &
          PID=$!

          for i in $(seq 1 15); do
            if curl -s http://127.0.0.1:19099/ >/dev/null 2>&1; then
              echo "Smoke ready after ${i}s"
              break
            fi
            sleep 1
          done

          curl -s http://127.0.0.1:19099/ | grep -q '"status":"ok"' || { echo "Health FAIL"; kill $PID; exit 1; }
          echo "Health OK"

          SAVE=$(curl -s -X POST http://127.0.0.1:19099/ -H "Content-Type: application/json" -d '{"jsonrpc":"2.0","id":1,"method":"tools/call","params":{"name":"memory_save","arguments":{"content":"smoke","type":"test"}}}')
          echo "$SAVE" | grep -q '"Saved:"' || { echo "Save FAIL"; kill $PID; exit 1; }
          echo "Save OK"

          kill $PID
          echo "Cross-platform smoke PASSED (${{ matrix.target }})"

  test:
    needs: [cross-check]
    name: Test
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: test-cargo-${{ hashFiles('Cargo.lock') }}
      - name: Build
        run: cargo build
      - name: Build release
        run: cargo build --release
      - name: Run tests
        run: cargo test
      - name: Daemon smoke test
        run: |
          mkdir -p /tmp/agentrete-test
          cat > /tmp/agentrete-test/config.toml << 'TOML'
          port = 19092
          db_dir = "/tmp/agentrete-test"

          [embedding]
          backend = "none"

          [knowledge_graph]
          enabled = false
          TOML

          ./target/debug/agentrete -c /tmp/agentrete-test/config.toml mcp --port 19092 &
          PID=$!

          for i in $(seq 1 15); do
            if curl -s http://127.0.0.1:19092/ >/dev/null 2>&1; then
              echo "Daemon ready after ${i}s"
              break
            fi
            sleep 1
          done

          curl -s http://127.0.0.1:19092/ | grep -q '"status":"ok"' && echo "Health OK" || { echo "Health FAIL"; kill $PID; exit 1; }

          SAVE=$(curl -s -X POST http://127.0.0.1:19092/ -H "Content-Type: application/json" -d '{"jsonrpc":"2.0","id":1,"method":"tools/call","params":{"name":"memory_save","arguments":{"content":"ci smoke test","type":"test"}}}')
          echo "$SAVE" | grep -q '"Saved:"' && echo "Save OK" || { echo "Save FAIL: $SAVE"; kill $PID; exit 1; }

          STATS=$(curl -s -X POST http://127.0.0.1:19092/ -H "Content-Type: application/json" -d '{"jsonrpc":"2.0","id":1,"method":"tools/call","params":{"name":"memory_stats","arguments":{}}}')
          echo "$STATS" | grep -q '"Memories: 1"' && echo "Stats OK" || { echo "Stats FAIL: $STATS"; kill $PID; exit 1; }

          kill $PID
          echo "Daemon smoke test PASSED"
