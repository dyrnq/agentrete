name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  BINARY_NAME: agentrete

jobs:
  test:
    name: Test
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: test-release-cargo-${{ hashFiles('Cargo.lock') }}
      - name: Run tests
        run: cargo test
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
          - os: macos-14
            target: x86_64-apple-darwin
          - os: macos-14
            target: aarch64-apple-darwin
          - os: windows-2022
            target: x86_64-pc-windows-msvc

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ matrix.target }}-cargo-${{ hashFiles('Cargo.lock') }}

      - name: Install NASM (Windows only)
        if: runner.os == 'Windows'
        uses: ilammy/setup-nasm@v1
      - name: Build (release)
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package binary
        shell: bash
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          SUFFIX=""
          case "${{ matrix.target }}" in
            *windows*) SUFFIX=".exe" ;;
          esac
          BIN="${{ env.BINARY_NAME }}-${TAG}-${{ matrix.target }}${SUFFIX}"
          SRC="target/${{ matrix.target }}/release/${{ env.BINARY_NAME }}${SUFFIX}"
          cp "$SRC" "$BIN"
          case "${{ runner.os }}" in
            macOS)   shasum -a 256 "$BIN" > "${BIN}.sha256" ;;
            Windows) certutil -hashfile "$BIN" SHA256 | grep -v "hash" | tr -d " \r\n" > "${BIN}.sha256" ;;
            *)       sha256sum "$BIN" > "${BIN}.sha256" ;;
          esac
          echo "artifact=${BIN}" >> $GITHUB_OUTPUT

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: ${{ env.BINARY_NAME }}-*

