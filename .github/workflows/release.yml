  release:
    name: GitHub Release + npm publish
    needs: [build]
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        shell: bash
        run: |
          mkdir -p release-assets
          find artifacts -type f -exec cp {} release-assets/ \;
          cd release-assets
          sha256sum * > sha256sums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          files: release-assets/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org/

      - name: Download platform binaries for npm
        shell: bash
        run: |
          mkdir -p npm/bin
          for dir in artifacts/*/; do
            platform=$(basename "$dir")
            # Find the actual binary file (skip .sha256 files)
            for f in "$dir"/*; do
              case "$f" in *.sha256) continue ;; esac
              binname="agentrete-${platform}"
              case "$platform" in
                *windows*) binname="${binname}.exe" ;;
              esac
              cp "$f" "npm/bin/$binname" 2>/dev/null || true
            done
          done
          chmod +x npm/bin/* 2>/dev/null || true
          ls -la npm/bin/

      - name: Update npm version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          cd npm
          node -e "const p=require('./package.json');p.version='$VERSION';require('fs').writeFileSync('package.json',JSON.stringify(p,null,2)+'\n')"
          VER=$(node -e "console.log(require('./package.json').version)")
          echo "npm package version: $VER"

      - name: Check npm version
        id: npm-check
        run: |
          VERSION=$(node -e "console.log(require('./npm/package.json').version)")
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://registry.npmjs.org/agentrete/$VERSION" 2>/dev/null || echo "000")
          if [ "$STATUS" = "200" ]; then
            echo "Version $VERSION already published to npm"
            echo "published=true" >> $GITHUB_OUTPUT
          else
            echo "Version $VERSION not yet published"
            echo "published=false" >> $GITHUB_OUTPUT
          fi

      - name: Publish to npm
        if: steps.npm-check.outputs.published != 'true'
        run: |
          cd npm
          npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
